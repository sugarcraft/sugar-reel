name: Sync to sugarcraft org

# Pushes changed lib/app subdirs to their sibling sugarcraft/<lib> repo,
# and pushes docs/ to sugarcraft/sugarcraft.github.io. Treats this
# monorepo as the source of truth.
#
# Only libs whose source/tests/config changed (or whose deps changed)
# are pushed — same affected-libs logic as ci.yml. Monorepo-wide changes
# (workflow files, root composer) push everything.
#
# Architecture: one "discover" job computes affected libs and emits a
# JSON matrix; a "sync-libs" matrix job fans out, one runner per lib, so
# subtree splits + pushes run in parallel. Concurrent splits in the SAME
# repo aren't safe (subtree uses git read-tree which writes .git/index),
# so the matrix gives each lib its own checkout/working tree.
#
# Auth: SUGARCRAFT_SYNC_TOKEN secret — a PAT with `repo` scope on
# the sugarcraft org. Without it, all push steps will 403.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: sync-sugarcraft
  cancel-in-progress: false

jobs:
  discover:
    name: Compute affected libs
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.affected.outputs.libs }}
      count: ${{ steps.affected.outputs.count }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # affected-libs.php --range HEAD~1..HEAD needs history

      - name: Compute affected libs (JSON array for matrix)
        id: affected
        run: |
          set -euo pipefail
          # If this is a workflow_dispatch run, force-all so manual runs
          # always sync everything. Otherwise use the script's
          # range-based affected detection.
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            libs_json=$(php scripts/affected-libs.php --all 2>/dev/null \
              | python3 -c 'import json,sys; print(json.dumps(json.load(sys.stdin)["all_libs"]))')
          else
            libs_json=$(php scripts/affected-libs.php --range HEAD~1..HEAD 2>/dev/null \
              | python3 -c 'import json,sys; d=json.load(sys.stdin); print(json.dumps(d["all_libs"] if d.get("force_all") else d.get("affected", [])))')
          fi
          count=$(echo "$libs_json" | python3 -c 'import json,sys; print(len(json.load(sys.stdin)))')
          echo "Affected: $count libs"
          echo "$libs_json" | python3 -m json.tool
          echo "libs=$libs_json" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

  sync-libs:
    name: Sync ${{ matrix.lib }}
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    # fail-fast=false: one failing lib shouldn't block the other 45.
    # max-parallel=10: friendly to GitHub Free's 20-concurrent-job cap;
    #                  with 46 libs this is ~5 batches × ~40s = ~3-4 min
    #                  total wall time (vs ~25 min serial).
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        lib: ${{ fromJSON(needs.discover.outputs.libs) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # git subtree split needs full history

      - name: Configure git identity + drop checkout's auth header
        run: |
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git config --local --unset-all http.https://github.com/.extraheader || true

      - name: Subtree-split + force-push ${{ matrix.lib }}
        env:
          TOKEN: ${{ secrets.SUGARCRAFT_SYNC_TOKEN }}
          LIB: ${{ matrix.lib }}
        run: |
          set -euo pipefail

          # Retry function for git push operations with exponential backoff
          retry_git_push() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while (( attempt <= max_attempts )); do
              if "$@"; then
                return 0
              fi
              echo "Push failed (attempt $attempt/$max_attempts), waiting ${delay}s..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
            echo "Push failed after $max_attempts attempts" >&2
            return 1
          }

          # Defensive: skip if the lib dir doesn't exist (race against
          # a delete + scheduled re-run).
          if [ ! -d "$LIB" ]; then
            echo "skip $LIB (no dir)"
            exit 0
          fi

          br="sync-$LIB"
          git branch -D "$br" 2>/dev/null || true
          git subtree split --prefix="$LIB" --branch="$br" --quiet

          retry_git_push git push --force \
            "https://x-access-token:$TOKEN@github.com/sugarcraft/$LIB.git" \
            "$br:master"

          git branch -D "$br" >/dev/null
          echo "✓ synced $LIB"

  sync-site:
    name: Push docs/ to sugarcraft/sugarcraft.github.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Mirror docs/ → sugarcraft.github.io master
        env:
          TOKEN: ${{ secrets.SUGARCRAFT_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          # Retry function for git push operations with exponential backoff
          retry_git_push() {
            local max_attempts=3
            local delay=5
            local attempt=1
            while (( attempt <= max_attempts )); do
              if "$@"; then
                return 0
              fi
              echo "Push failed (attempt $attempt/$max_attempts), waiting ${delay}s..." >&2
              sleep $delay
              ((attempt++))
              delay=$((delay * 2))
            done
            echo "Push failed after $max_attempts attempts" >&2
            return 1
          }

          tmp=$(mktemp -d)
          git clone --quiet \
            "https://x-access-token:$TOKEN@github.com/sugarcraft/sugarcraft.github.io.git" \
            "$tmp/site"
          rsync -a --delete --exclude=.git ./docs/ "$tmp/site/"
          cd "$tmp/site"
          git config user.name  'Joe Huss'
          git config user.email 'detain@interserver.net'
          git add -A
          if git diff --cached --quiet; then
            echo "site already in sync"
            exit 0
          fi
          git commit --quiet -m "Sync from monorepo @ ${GITHUB_SHA:0:7}"
          retry_git_push git push --quiet origin master
          echo "✓ pushed site update"
